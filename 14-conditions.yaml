- name: even or odd
  hosts: local
  connection: local
  
  tasks:
  - name: is even
    when: given_number % 2 == 0
    debug:
      msg: "give number: {{ given_number }} is even"
    
  - name: is odd
    when: given_number % 2 != 0
    debug:
      msg: "give number: {{ given_number }} is odd"
    