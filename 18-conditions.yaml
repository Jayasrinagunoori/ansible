- name: install packages
  hosts: frontend
  become: Yes
  tasks:
  - name: install packages
    package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: "nginx", state: "present" }
    - { name: "mysql", state: "absent" }
    - { name: "zip", state: "present" }
   